<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Polls — VoteNow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
        VoteNow
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="polls.html" class="nav-link active">Browse Polls</a>
        <a href="create.html" class="nav-link">Create Poll</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="page-header" style="display: flex; justify-content: space-between; align-items: flex-end; text-align: left; margin-bottom: 3rem;">
      <div>
        <h1>Live Polls</h1>
        <p>Participate in active community discussions.</p>
      </div>
      <button id="refresh-polls-btn" class="btn btn-outline" title="Refresh Feed">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
        Refresh
      </button>
    </div>

    <div id="polls-list" class="polls-grid">
      <div style="text-align: center; grid-column: 1/-1; padding: 4rem;">
        <p style="color: var(--text-dim);">Loading active polls...</p>
      </div>
    </div>
  </main>

  <footer style="margin-top: 6rem; padding: 4rem 2rem; border-top: 1px solid var(--border); text-align: center; color: var(--text-muted); font-size: 0.85rem;">
    <p>&copy; <span id="year"></span> VoteNow. All rights reserved.</p>
    <p style="margin-top: 0.5rem; font-weight: 600; color: var(--text-dim);">Created by Lokesh Daripalli</p>
    <div style="margin-top: 1rem; display: flex; gap: 1.5rem; justify-content: center;">
      <a href="privacy.html" style="color: var(--primary);">Privacy Policy</a>
      <a href="terms.html" style="color: var(--primary);">Terms of Service</a>
    </div>
  </footer>

  <!-- Template for Poll Card -->
  <template id="poll-card-template">
    <article class="card poll-card" data-poll-id="">
      <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <h3 class="poll-question"></h3>
        <button class="delete-btn btn-outline" style="padding: 0.35rem; border: none; cursor: pointer;" title="Delete">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </button>
      </div>
      
      <div class="poll-options" style="margin-top: 1.5rem;">
        <!-- Options or Results Injected Here -->
      </div>

      <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
        <span class="total-votes" style="font-size: 0.85rem; font-weight: 600; color: var(--text-muted);">0 votes</span>
        <span class="voted-badge hidden">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          Voted
        </span>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
