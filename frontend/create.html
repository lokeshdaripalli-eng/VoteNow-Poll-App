<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create a Poll — VoteNow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
        VoteNow
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="polls.html" class="nav-link">Browse Polls</a>
        <a href="create.html" class="nav-link active">Create Poll</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="page-header" style="margin-bottom: 3rem;">
      <h1>Create a Poll</h1>
      <p>Ask anything. Your poll will be live instantly.</p>
    </div>

    <div style="max-width: 600px; margin: 0 auto;">
      <section class="card">
        <form id="create-poll-form">
          <div class="form-group">
            <label for="question">The Question</label>
            <input type="text" id="question" placeholder="e.g. What should we have for lunch?" required autocomplete="off">
          </div>
          
          <div id="options-container">
            <label>Options</label>
            <div class="form-group option-group">
              <input type="text" class="option-input" placeholder="Option 1" required autocomplete="off">
            </div>
            <div class="form-group option-group">
              <input type="text" class="option-input" placeholder="Option 2" required autocomplete="off">
            </div>
          </div>

          <div style="display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem;">
            <button type="button" id="add-option-btn" class="btn btn-secondary">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              Add another option
            </button>
            <button type="submit" id="create-poll-btn" class="btn btn-primary" style="padding: 1.1rem;">
              Launch Poll
            </button>
          </div>

          <p id="form-error" class="error-msg hidden"></p>
        </form>
      </section>
    </div>
  </main>

  <footer style="margin-top: 6rem; padding: 4rem 2rem; border-top: 1px solid var(--border); text-align: center; color: var(--text-muted); font-size: 0.85rem;">
    <p>&copy; <span id="year"></span> VoteNow. All rights reserved.</p>
    <p style="margin-top: 0.5rem; font-weight: 600; color: var(--text-dim);">Created by Lokesh Daripalli</p>
    <div style="margin-top: 1rem; display: flex; gap: 1.5rem; justify-content: center;">
      <a href="privacy.html" style="color: var(--primary);">Privacy Policy</a>
      <a href="terms.html" style="color: var(--primary);">Terms of Service</a>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
